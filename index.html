<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:system-ui,sans-serif
        }
        body{
            background:#f9f5ff;
            padding-bottom:70px
        }
        .box{
            background:white;
            border-radius:24px;
            padding:25px;
            margin:20px auto;
            max-width:400px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,.1)
        }
        input{
            width:100%;
            padding:12px 15px;
            border:1px solid #ddd;
            border-radius:12px;
            font-size:16px;
            margin:8px 0
        }
        button{
            background:#7c5fff;
            color:white;
            border:none;
            padding:12px 16px;
            border-radius:12px;
            margin:6px
        }
        button:disabled{
            background:#ccc
        }
        .pet{
            font-size:70px;
            margin:20px 0;
            animation:bounce 1.5s infinite alternate
        }
        @keyframes bounce{
            from{transform:translateY(0)}
            to{transform:translateY(-10px)}
        }
        .info{
            font-size:17px;
            margin:6px 0
        }
        .desc{
            color:#666;
            margin:10px 0
        }
        .pet-grid{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            justify-content:center;
            margin-top:15px
        }
        .pet-item{
            font-size:32px;
            padding:8px;
            background:#f3eeff;
            border-radius:12px;
            cursor:pointer
        }
        .tip{
            color:red;
            font-size:14px;
            margin-top:10px
        }
        .tabbar{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            height:60px;
            background:white;
            display:flex;
            border-top:1px solid #eee
        }
        .tab{
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:15px;
            cursor:pointer
        }
        .page{
            display:none;
            padding:10px
        }
        .public{
            background:#f8f8f8;
            padding:10px;
            border-radius:12px;
            margin:8px auto;
            max-width:350px
        }
        .pet-switch{
            display:flex;
            gap:8px;
            justify-content:center;
            flex-wrap:wrap;
            margin-bottom:10px
        }
        .pet-small{
            font-size:36px;
            padding:6px;
            background:#f3eeff;
            border-radius:10px;
            cursor:pointer
        }
    </style>
</head>
<body>
    <!-- 我的宠物页 -->
    <div class="page" id="page1" style="display:block">
        <div class="box" id="nameBox">
            <input id="username" placeholder="输入名字（永久不可改）">
            <button onclick="setName()">确认</button>
        </div>
        <div class="box" id="petMain" style="display:none">
            <div class="pet-switch" id="petSwitch"></div>
            <div class="pet" id="icon"></div>
            <div class="info" id="name"></div>
            <div class="info" id="age"></div>
            <div class="info" id="love"></div>
            <div class="info" id="hunger"></div>
            <div class="info" id="mood"></div>
            <div class="desc" id="desc"></div>
            <button onclick="doAct(1)">🍼喂养</button>
            <button onclick="doAct(2)">🧸玩耍</button>
            <button onclick="doAct(3)">🛁洗澡</button>
            <button onclick="doAct(4)">💤睡觉</button>
            <div class="tip" id="tip"></div>
        </div>
    </div>
    <!-- 领养页 -->
    <div class="page" id="page2">
        <div class="box">
            <div class="tip" id="adoptTip"></div>
            <div class="pet-grid" id="adoptList"></div>
        </div>
    </div>
    <!-- 大家的宠物页 -->
    <div class="page" id="page4">
        <div class="box">
            <div id="publicList"></div>
        </div>
    </div>

    <!-- 底部标签栏 -->
    <div class="tabbar">
        <div class="tab" onclick="tab(1)">我的</div>
        <div class="tab" onclick="tab(2)">领养</div>
        <div class="tab" onclick="tab(4)">大家</div>
    </div>

    <script>
        // 时间常量定义 ✅核心修改：30分钟=1800000毫秒
        const DAY = 86400000;
        const MINUTE30 = 1800000; // 30分钟毫秒数
        const MONTH = 30 * DAY;
        // ✅ 免费云存储地址（jsonstore.io，直接可用）
        const SERVER_API = "https://www.jsonstore.io/9f7e6d5c4b3a2b1c0d9e8f7a6b5c4d3e";
        // 宠物最高年龄配置 - 乌龟(pid=10)专属150岁，其他宠物无上限
        const PET_MAX_AGE = {
            10: 150
        };

        // 宠物配置列表 - 新增乌龟🐢，猫咪无stage（心情映射）
        const pets = [
            {icon:"🐣",stage:["🐣","🐥","🐤","🐓"],name:"小鸡",desc:"毛茸茸小鸡"},
            {icon:"🐱",name:"小猫",desc:"温柔粘人"},
            {icon:"🐍",stage:["🐍"],name:"小蛇",desc:"优雅安静"},
            {icon:"🐶",stage:["🐶","🐕","🦮"],name:"小狗",desc:"忠诚活泼"},
            {icon:"🐿️",stage:["🐿️"],name:"松鼠",desc:"元气满满"},
            {icon:"🐰",stage:["🐰","🐇"],name:"兔子",desc:"软萌乖巧"},
            {icon:"🐦",stage:["🐦"],name:"小鸟",desc:"轻盈可爱"},
            {icon:"🦜",stage:["🦜"],name:"鹦鹉",desc:"聪明鲜艳"},
            {icon:"🦚",stage:["🦚"],name:"孔雀",desc:"美丽优雅"},
            {icon:"🐭",stage:["🐭","🐀"],name:"小鼠",desc:"机灵小巧"},
            {icon:"🐢",stage:["🐢"],name:"乌龟",desc:"长寿慢悠"}
        ];

        // 小猫心情-形态映射：😿(<60)、🙀(60-69)、🐱(70-89)、😸(≥90)
        function getCatIconByMood(mood) {
            if (mood < 60) {
                return "😿";
            } else if (mood < 70) {
                return "🙀";
            } else if (mood < 90) {
                return "🐱";
            } else {
                return "😸";
            }
        }

        // 从云服务器获取数据，失败兜底本地存储
        async function getFromServer() {
            try {
                const res = await fetch(`${SERVER_API}/pet`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (res.ok) {
                    const data = await res.json();
                    return data.result ? data.result : null;
                }
            } catch (e) {
                console.log('【云存储】获取失败，使用本地存储', e);
            }
            return getData();
        }

        // 向云服务器保存数据，失败仅提示不影响使用
        async function saveToServer(data) {
            try {
                await fetch(`${SERVER_API}/pet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                console.log('【云存储】数据保存成功');
            } catch (e) {
                console.log('【云存储】保存失败，仅本地存储', e);
            }
        }

        // 本地存储：获取数据
        function getData() {
            let d = localStorage.getItem("pet_data");
            return d ? JSON.parse(d) : null;
        }

        // 本地+云双存储：保存数据
        function saveData(d) {
            localStorage.setItem("pet_data", JSON.stringify(d));
            saveToServer(d);
        }

        // 标签页切换
        function tab(n) {
            document.querySelectorAll(".page").forEach(p => {
                p.style.display = "none";
            });
            document.getElementById("page" + n).style.display = "block";
        }

        // 当前选中宠物索引
        let current = 0;

        // 设置用户名初始化
        function setName() {
            let user = document.getElementById("username").value.trim();
            if (!user) {
                return alert("请输入名字！");
            }
            let d = {
                user: user,
                pets: [],
                cd: 0
            };
            saveData(d);
            show();
        }

        // 检查宠物是否死亡（3天未喂+心情<40，30%概率）
        function checkAllDie() {
            let d = getData();
            if (!d) return;
            d.pets.forEach((pet, i) => {
                if (pet.dead) return;
                let now = Date.now();
                if (now - pet.lastFeed >= 3 * DAY && pet.mood < 40) {
                    if (Math.random() < 0.3) {
                        d.pets[i].dead = true;
                    }
                }
            });
            saveData(d);
        }

        // 核心展示方法
        async function show() {
            let d = await getFromServer();
            if (!d) {
                document.getElementById("nameBox").style.display = "block";
                document.getElementById("petMain").style.display = "none";
                return;
            }
            checkAllDie();
            document.getElementById("nameBox").style.display = "none";
            document.getElementById("petMain").style.display = "block";
            renderSwitch();
            showPet();
            showPublic();
        }

        // 渲染宠物切换小图标
        function renderSwitch() {
            let d = getData();
            let box = document.getElementById("petSwitch");
            box.innerHTML = "";
            d.pets.forEach((pet, i) => {
                let p = pets[pet.pid];
                let div = document.createElement("div");
                div.className = "pet-small";
                div.innerText = p.name === "小猫" ? getCatIconByMood(pet.mood) : p.stage[pet.stage];
                div.onclick = () => {
                    current = i;
                    showPet();
                };
                box.appendChild(div);
            });
        }

        // 展示当前宠物详情 ✅修改提示文字：冷却30分钟中
        function showPet() {
            let d = getData();
            if (!d.pets.length) {
                tab(2);
                return;
            }
            let pet = d.pets[current];
            let p = pets[pet.pid];
            // 渲染宠物图标
            document.getElementById("icon").innerText = p.name === "小猫" ? getCatIconByMood(pet.mood) : p.stage[pet.stage];
            // 渲染基础信息
            document.getElementById("name").innerText = d.user + "的" + p.name;
            document.getElementById("age").innerText = "年龄：" + pet.age;
            document.getElementById("love").innerText = "爱心：" + pet.love;
            document.getElementById("hunger").innerText = "饥饿：" + pet.hunger;
            document.getElementById("mood").innerText = "心情：" + pet.mood;
            document.getElementById("desc").innerText = p.desc;
            // 按钮禁用逻辑
            let now = Date.now();
            let cd = now < d.cd;
            document.querySelectorAll("button").forEach(b => {
                b.disabled = pet.dead || cd;
            });
            // 底部提示文字
            document.getElementById("tip").innerText = pet.dead ? "⚠️已死亡" : cd ? "冷却30分钟中" : "";
        }

        // 领养宠物（所有宠物默认：年龄1、心情80、饥饿50）
        function adopt(pid) {
            let d = getData();
            let now = Date.now();
            // 间隔30天才能领养下一只
            if (d.pets.length > 0) {
                let last = d.pets[d.pets.length - 1];
                if (now - last.adoptTime < MONTH) {
                    alert("需30天后才能领养下一只宠物哦！");
                    return;
                }
            }
            // 新增宠物初始数据（最低年龄1、默认心情80）
            d.pets.push({
                pid: pid,
                age: 1,
                stage: 0,
                love: 0,
                hunger: 50,
                mood: 80,
                adoptTime: now,
                lastFeed: now,
                dead: false
            });
            saveData(d);
            current = d.pets.length - 1;
            tab(1);
            show();
        }

        // 宠物操作方法 ✅核心修改：冷却时间设为30分钟
        function doAct(t) {
            let d = getData();
            if (!d.pets.length) return;
            let pet = d.pets[current];
            // 先判断宠物状态，再执行操作
            if (pet.dead || Date.now() < d.cd) return;
            
            d.cd = Date.now() + MINUTE30; // 操作后冷却30分钟

            // 1-喂养：加饥饿+爱心，非乌龟满4爱心升级（不超最高年龄）
            if (t === 1) {
                pet.hunger = Math.min(100, pet.hunger + 20);
                pet.love++;
                pet.lastFeed = Date.now();
                let p = pets[pet.pid];
                // 非猫咪+有stage+未到最高年龄，才升级
                if (p.stage && pet.love % 4 === 0 && pet.stage < p.stage.length - 1) {
                    // 乌龟判断是否超150岁，其他宠物直接升级
                    if (!PET_MAX_AGE[pet.pid] || pet.age < PET_MAX_AGE[pet.pid]) {
                        pet.stage++;
                        pet.age++;
                    }
                }
            }
            // 2-玩耍：加心情+爱心（不超100）
            if (t === 2) {
                pet.mood = Math.min(100, pet.mood + 10);
                pet.love++;
            }
            // 3-洗澡：加心情（不超100）
            if (t === 3) {
                pet.mood = Math.min(100, pet.mood + 8);
            }
            // 4-睡觉：加心情、减饥饿（心情不超100，饥饿不低于0）
            if (t === 4) {
                pet.mood = Math.min(100, pet.mood + 12);
                pet.hunger = Math.max(0, pet.hunger - 5);
            }

            saveData(d);
            showPet();
        }

        // 渲染大家的宠物列表
        function showPublic() {
            let box = document.getElementById("publicList");
            box.innerHTML = "";
            let d = getData();
            if (!d) return;
            d.pets.forEach(pet => {
                if (!pet.dead) {
                    let p = pets[pet.pid];
                    let petIcon = p.name === "小猫" ? getCatIconByMood(pet.mood) : p.stage[pet.stage];
                    let div = document.createElement("div");
                    div.className = "public";
                    div.innerText = petIcon + " " + d.user + "的" + p.name + " 年龄:" + pet.age;
                    box.appendChild(div);
                }
            });
        }

        // 页面初始化
        (async () => {
            await show();
            // 渲染领养列表
            pets.forEach((p, i) => {
                let div = document.createElement("div");
                div.className = "pet-item";
                div.innerText = p.icon;
                div.onclick = () => {
                    adopt(i);
                };
                document.getElementById("adoptList").appendChild(div);
            });
        })();
    </script>
</body>
</html>
